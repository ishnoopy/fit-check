name: CI

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ishnoopy/fit-check-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    name: Build and Push Backend Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ishnoopy/fit-check-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "deployed/docker-compose.yml"
          target: "~/app/fit-check/"
          strip_components: 1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/app/fit-check

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Check backend API health
        run: |
          success=0

          for i in {1..10}; do
            if curl -f https://${{ vars.DOMAIN }}/api/health; then
              success=1
              break
            fi

            echo "API health check failed, retrying..."
            sleep 5
          done

          if [ "$success" -ne 1 ]; then
            echo "API health check failed after 10 attempts, exiting..."
            exit 1
          fi

      - name: Check frontend health
        run: |
          success=0

          for i in {1..10}; do
            if curl -f https://${{ vars.DOMAIN }}; then
              success=1
              break
            fi

            echo "Frontend health check failed, retrying..."
            sleep 5
          done

          if [ "$success" -ne 1 ]; then
            echo "Frontend health check failed after 10 attempts, exiting..."
            exit 1
          fi

      - name: Success
        if: success()
        run: echo "Deployment successful ✅"

      - name: Failure
        if: failure()
        run: echo "Deployment failed ❌"
