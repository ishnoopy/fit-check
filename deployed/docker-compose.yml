services:
  frontend:
    image: ishnoopy/fit-check-frontend:latest
    container_name: frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

  backend-1:
    image: ishnoopy/fit-check-backend:latest
    container_name: backend-1
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL}
    expose:
      - "4000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

  backend-2:
    image: ishnoopy/fit-check-backend:latest
    container_name: backend-2
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL}
    expose:
      - "4000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

  mongo:
    image: mongo:7.0.14
    container_name: mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
  redis_data:
